<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#12131a" />
  <!-- a glyph 'G' with a slice taken out of it -->
  <text
    x="16"
    y="23.5"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    text-anchor="middle"
    fill="#f5b544"
  >G</text>
  <!-- the cut: a diagonal notch removing part of the glyph -->
  <path d="M4 26.5 L28 9.5" stroke="#12131a" stroke-width="3.2" stroke-linecap="round" />
  <path d="M4 26.5 L28 9.5" stroke="#f5b544" stroke-width="1" stroke-linecap="round" opacity="0.55" stroke-dasharray="2 3" />
</svg>
